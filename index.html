<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon App ToDo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md m-4">
        <h1 class="text-3xl font-extrabold text-slate-800 mb-6 text-center">📋 Mes Tâches</h1>

        <div class="flex gap-2 mb-6">
            <input type="text" id="todoInput" placeholder="Ajouter une tâche..." 
                class="flex-1 px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-slate-700">
            <button onclick="addTodo()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2 rounded-xl transition-colors">
                Ajouter
            </button>
        </div>

        <ul id="todoList" class="space-y-3">
            </ul>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
