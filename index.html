<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon App ToDo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="todo-container">
        <h1 class="todo-title">📋 Mes Tâches</h1>

        <div class="input-group">
            <input type="text" id="todoInput" placeholder="Ajouter une tâche..." class="todo-input">
            <button onclick="addTodo()" class="btn-add">Ajouter</button>
        </div>

        <ul id="todoList" class="todo-list">
            <!-- La liste de tout les tâches ajouter via le code JS-->
        </ul>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
